<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Master – Can you? · Michael Kim</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:linear-gradient(135deg,#1B3A6B,#0E7490);border-radius:20px;padding:24px 20px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);color:#fff}
h1{text-align:center;font-size:1.3rem;margin-bottom:4px;color:#e0e7ff}
.sub{text-align:center;font-size:.75rem;color:#93c5fd;margin-bottom:18px}
.stage-tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{flex:1;padding:7px 4px;border-radius:8px;border:none;font-size:.75rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,.1);color:#cbd5e1;transition:.2s}
.tab.active{background:#7C3AED;color:#fff}
.prog-wrap{background:rgba(255,255,255,.15);border-radius:4px;height:6px;margin-bottom:14px;overflow:hidden}
.prog{height:6px;border-radius:4px;background:#7C3AED;transition:width .4s}
.sc-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.sc-card{background:rgba(255,255,255,.1);border-radius:8px;padding:7px 4px;text-align:center}
.sc-label{font-size:9px;color:#93c5fd;margin-bottom:2px}
.sc-val{font-size:17px;font-weight:600}
.try-dots{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2)}
.dot.used{background:#f87171}
.dot.ok{background:#4ade80}
.q-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;min-height:64px;font-size:1rem;line-height:1.6;color:#e0e7ff}
.fb{min-height:22px;font-size:.85rem;text-align:center;margin-bottom:8px;font-weight:600}
.fb.ok{color:#4ade80}
.fb.ng{color:#f87171}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.choice-btn{padding:11px 14px;border:1px solid rgba(124,58,237,.5);border-radius:10px;background:rgba(124,58,237,.1);color:#e0e7ff;font-size:.9rem;font-weight:500;cursor:pointer;text-align:left;transition:.15s;font-family:'Segoe UI',sans-serif}
.choice-btn:hover{background:rgba(124,58,237,.3)}
.choice-btn.correct{background:#14532d;border-color:#4ade80;color:#bbf7d0}
.choice-btn.wrong{background:#7f1d1d;border-color:#f87171;color:#fecaca;animation:shake .3s}
.choice-btn.disabled{opacity:.4;pointer-events:none}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.answer-area{display:flex;flex-wrap:wrap;gap:7px;min-height:48px;background:rgba(255,255,255,.06);border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid rgba(124,58,237,.4)}
.chip-area{display:flex;flex-wrap:wrap;gap:7px;min-height:48px;background:rgba(255,255,255,.06);border-radius:10px;padding:10px;margin-bottom:8px;border:1px dashed rgba(255,255,255,.2)}
.chip{padding:7px 13px;border-radius:8px;background:#7C3AED;color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;transition:.15s;user-select:none}
.chip:hover{background:#6D28D9;transform:scale(1.05)}
.chip.used{opacity:.2;pointer-events:none}
.answer-chip{padding:7px 13px;border-radius:8px;background:#0E7490;color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;transition:.15s;user-select:none}
.answer-chip:hover{background:#0c6276;transform:scale(1.05)}
.input-wrap{display:flex;gap:8px;margin-bottom:10px}
.input-wrap input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(124,58,237,.5);background:rgba(255,255,255,.08);color:#fff;font-size:.95rem;outline:none;font-family:'Segoe UI',sans-serif}
.input-wrap input::placeholder{color:#64748b}
.input-wrap input:focus{border-color:#7C3AED}
.submit-btn{padding:10px 18px;border-radius:10px;border:none;background:#7C3AED;color:#fff;font-weight:700;font-size:.9rem;cursor:pointer}
.submit-btn:hover{background:#6D28D9}
.clear-btn{padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#cbd5e1;font-size:.8rem;cursor:pointer;margin-bottom:8px}
.nav-btn{width:100%;padding:11px;border-radius:10px;border:none;background:#7C3AED;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;margin-top:4px}
.nav-btn:hover{background:#6D28D9}
#done-card{display:none;background:linear-gradient(135deg,#1B3A6B,#0E7490);border-radius:20px;padding:24px 20px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);color:#fff}
.grade-circle{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;margin:0 auto 12px}
.wrong-item{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:.82rem}
.wi-q{color:#93c5fd;margin-bottom:3px}
.wi-user{color:#f87171}
.wi-ans{color:#4ade80}
.wi-try{color:#fbbf24;font-size:.75rem}
.report-wrap{background:rgba(255,255,255,.06);border-radius:10px;padding:12px;margin-top:12px}
.name-input{width:100%;padding:9px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:.9rem;margin-bottom:8px;outline:none;font-family:'Segoe UI',sans-serif}
.save-btn{width:100%;padding:10px;border-radius:8px;border:none;background:#7C3AED;color:#fff;font-weight:700;cursor:pointer;font-size:.9rem}
.restart-btn{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#cbd5e1;font-weight:600;cursor:pointer;font-size:.9rem;margin-top:8px}
</style>
</head>
<body>

<div class="card" id="main-card">
  <h1>👑 Order Master</h1>
  <p class="sub">Teacher: Michael Kim · Can you?</p>
  <div class="stage-tabs">
    <button class="tab active" id="tab0">① Spelling</button>
    <button class="tab" id="tab1">② Order King</button>
    <button class="tab" id="tab2">③ Study</button>
  </div>
  <div class="prog-wrap"><div class="prog" id="prog"></div></div>
  <div class="sc-row">
    <div class="sc-card"><div class="sc-label">Score</div><div class="sc-val" id="sc-score">0</div></div>
    <div class="sc-card"><div class="sc-label">Correct</div><div class="sc-val" id="sc-ok" style="color:#4ade80">0</div></div>
    <div class="sc-card"><div class="sc-label">Wrong</div><div class="sc-val" id="sc-wrong" style="color:#f87171">0</div></div>
    <div class="sc-card"><div class="sc-label">Left</div><div class="sc-val" id="sc-left">-</div></div>
  </div>
  <div class="try-dots" id="try-dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
  </div>
  <div class="q-box" id="q-box">Loading...</div>
  <div class="fb" id="fb"></div>
  <div id="stage-area"></div>
  <button class="nav-btn" id="nav-btn" style="display:none">다음 →</button>
</div>

<div id="done-card">
  <h1 style="text-align:center;margin-bottom:4px">🏆 Result</h1>
  <p style="text-align:center;font-size:.75rem;color:#93c5fd;margin-bottom:16px">Teacher: Michael Kim</p>
  <div class="grade-circle" id="grade-circle"></div>
  <div style="text-align:center;font-size:1.6rem;font-weight:700;margin-bottom:4px" id="final-score"></div>
  <div style="text-align:center;font-size:.85rem;color:#93c5fd;margin-bottom:14px" id="final-detail"></div>
  <div id="mistake-list"></div>
  <div class="report-wrap">
    <input class="name-input" id="stu-name" placeholder="학생 이름 입력" maxlength="15"/>
    <button class="save-btn" id="save-jpg-btn">📸 JPG 성적표 저장</button>
    <button class="restart-btn" id="restart-btn">🔄 처음부터</button>
  </div>
</div>

<script>
// ── Stage 1: Spelling ─────────────────────────────────
const Q_DATA = [
  {ko:"땅을 파다",    ans:"dig",    pool:["dig","fly","crawl","swim","jump"]},
  {ko:"날다",         ans:"fly",    pool:["fly","dig","crawl","swim","jump"]},
  {ko:"기어가다",     ans:"crawl",  pool:["crawl","dig","fly","swim","jump"]},
  {ko:"수영하다",     ans:"swim",   pool:["swim","dig","fly","crawl","jump"]},
  {ko:"점프하다",     ans:"jump",   pool:["jump","dig","fly","crawl","swim"]},
  {ko:"할 수 있다",   ans:"can",    pool:["can","can't","but","no","yes"]},
  {ko:"할 수 없다",   ans:"can't",  pool:["can't","can","but","no","yes"]},
  {ko:"하지만",       ans:"but",    pool:["but","can","can't","no","yes"]},
];

// ── Stage 2: Order King ───────────────────────────────
const K_DATA = [
  {ko:"너는 땅을 팔 수 있니?",       words:["Can","you","dig"]},
  {ko:"너는 날 수 있니?",            words:["Can","you","fly"]},
  {ko:"너는 기어갈 수 있니?",        words:["Can","you","crawl"]},
  {ko:"너는 수영할 수 있니?",        words:["Can","you","swim"]},
  {ko:"아니, 나는 못해.",            words:["No","I","can't"]},
  {ko:"하지만 나는 점프할 수 있어!", words:["But","I","can","jump"]},
];

// ── Stage 3: Study ────────────────────────────────────
const S_DATA = [
  {type:"mc",
   q:"'Can you dig?'의 뜻은 무엇인가요?",
   choices:["너는 날 수 있니?","너는 기어갈 수 있니?","너는 땅을 팔 수 있니?","너는 수영할 수 있니?","너는 점프할 수 있니?"],
   ans:"너는 땅을 팔 수 있니?"},
  {type:"mc",
   q:"'No, I can't.'는 어떤 뜻인가요?",
   choices:["응, 나는 할 수 있어.","아니, 나는 못해.","하지만 나는 할 수 있어.","나는 날 수 있어.","나는 수영할 수 없어."],
   ans:"아니, 나는 못해."},
  {type:"mc",
   q:"'But I can jump!'에서 'but'의 역할은?",
   choices:["이유를 설명한다","앞 내용을 강조한다","앞 내용과 반대되는 내용을 연결한다","질문을 만든다","부정을 나타낸다"],
   ans:"앞 내용과 반대되는 내용을 연결한다"},
  {type:"mc",
   q:"다음 중 'can'을 사용하는 올바른 문장은?",
   choices:["I can to swim.","Can you swims?","She can fly.","He cans jump.","They can crawls."],
   ans:"She can fly."},
  {type:"mc",
   q:"'Can you swim?'에 부정으로 대답하면?",
   choices:["Yes, I can.","No, I can.","No, I can't.","I swim not.","Can't I swim."],
   ans:"No, I can't."},
  {type:"sa",
   q:"'너는 기어갈 수 있니?'를 영어로 쓰세요. (Can으로 시작)",
   ans:"Can you crawl"},
  {type:"sa",
   q:"'하지만 나는 점프할 수 있어!'를 영어로 쓰세요. (But으로 시작)",
   ans:"But I can jump"},
  {type:"sa",
   q:"'can'의 부정형은 무엇인가요?",
   ans:"can't"},
];

// ── 전역 상태 ─────────────────────────────────────────
const STAGES = [Q_DATA, K_DATA, S_DATA];
const TOTAL_Q = Q_DATA.length + K_DATA.length + S_DATA.length;
const PER_Q   = 100 / TOTAL_Q;

let stage=0, cur=0, attempt=0;
let totalScore=0, okCount=0, wrongCount=0;
let mistakeLog=[], answered=false;
let stageOffset=0;
let answerChips=[], chipWords=[], curItem=null;

// ── TTS ───────────────────────────────────────────────
function speak(txt,rate,pitch){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=rate||1;u.pitch=pitch||1;
  window.speechSynthesis.speak(u);
}

// ── 점수 ─────────────────────────────────────────────
function weight(a){return a===1?1.0:a===2?0.7:a===3?0.4:0;}
function addScore(a){
  totalScore=Math.min(100,totalScore+PER_Q*weight(a));
  document.getElementById('sc-score').textContent=Math.round(totalScore);
}

// ── norm ─────────────────────────────────────────────
function norm(s){return String(s).toLowerCase().trim().replace(/[.?!,]/g,'');}

// ── UI ───────────────────────────────────────────────
function setFb(msg,cls){
  const el=document.getElementById('fb');
  el.textContent=msg;el.className='fb '+(cls||'');
}
function updateStats(){
  document.getElementById('sc-ok').textContent=okCount;
  document.getElementById('sc-wrong').textContent=wrongCount;
  const done=stageOffset+cur;
  document.getElementById('sc-left').textContent=Math.max(0,TOTAL_Q-done);
  document.getElementById('prog').style.width=(done/TOTAL_Q*100)+'%';
}
function updateTabs(){
  for(let i=0;i<3;i++)
    document.getElementById('tab'+i).classList.toggle('active',i===stage);
}
function resetDots(){
  for(let i=0;i<3;i++)document.getElementById('d'+i).className='dot';
}
function updateDots(a,ok){
  for(let i=0;i<3;i++){
    const d=document.getElementById('d'+i);
    d.className='dot';
    if(i<a-1)d.classList.add('used');
    if(ok&&i===a-1)d.classList.add('ok');
    else if(!ok&&i===a-1)d.classList.add('used');
  }
}
function showNav(){
  const btn=document.getElementById('nav-btn');
  btn.style.display='block';
  btn.textContent=isLast()?'결과 보기 🏆':'다음 →';
}
function isLast(){
  return stage===2&&cur===S_DATA.length-1;
}

// ── 선택지 셔플 (정답 위치 다양화) ──────────────────
function shuffleChoices(pool,ans){
  const others=[...pool].filter(x=>x!==ans).sort(()=>Math.random()-.5);
  const result=others.slice(0,4);
  const pos=Math.floor(Math.random()*5);
  result.splice(pos,0,ans);
  return result.slice(0,5);
}

// ── Stage 1: Spelling ─────────────────────────────────
function renderSpelling(item){
  document.getElementById('q-box').innerHTML=
    `<div style="font-size:1.1rem;font-weight:700;color:#fde68a">${item.ko}</div>
     <div style="font-size:.75rem;color:#93c5fd;margin-top:6px">알맞은 영어 단어를 고르세요</div>`;
  const choices=shuffleChoices(item.pool,item.ans);
  const area=document.getElementById('stage-area');
  area.innerHTML='';
  const div=document.createElement('div');div.className='choices';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=c;
    btn.addEventListener('click',()=>onSpellingChoice(c,btn,item));
    div.appendChild(btn);
  });
  area.appendChild(div);
}

function onSpellingChoice(choice,btn,item){
  if(answered)return;
  attempt++;
  const allBtns=document.querySelectorAll('.choice-btn');
  if(norm(choice)===norm(item.ans)){
    answered=true;
    btn.classList.add('correct');
    allBtns.forEach(b=>{if(b!==btn)b.classList.add('disabled');});
    speak('Great',1.1,1.3);
    addScore(attempt);okCount++;
    updateDots(attempt,true);
    setFb('✅ Correct! +'+Math.round(PER_Q*weight(attempt))+'점','ok');
    updateStats();showNav();
  }else{
    btn.classList.add('wrong');
    setTimeout(()=>btn.classList.remove('wrong'),400);
    speak('Oh No',0.9,0.85);
    wrongCount++;
    mistakeLog.push({q:item.ko,user:choice,correct:item.ans,try:attempt});
    updateDots(attempt,false);updateStats();
    if(attempt>=3){
      answered=true;
      allBtns.forEach(b=>{
        b.classList.add('disabled');
        if(norm(b.textContent)===norm(item.ans))b.classList.add('correct');
      });
      setFb('❌ 정답: '+item.ans,'ng');showNav();
    }else{
      setFb(`❌ 틀렸어요! (${attempt}/3회)`,'ng');
    }
  }
}

// ── Stage 2: Order King ───────────────────────────────
function renderOrder(item){
  curItem=item;
  answerChips=[];
  document.getElementById('q-box').innerHTML=
    `<div style="font-size:.8rem;color:#7dd3fc;margin-bottom:4px">단어를 순서대로 배열하세요</div>
     <div style="font-size:1rem;font-weight:700;color:#fde68a">${item.ko}</div>`;
  chipWords=[...item.words].sort(()=>Math.random()-.5);
  const area=document.getElementById('stage-area');
  area.innerHTML='';

  const ansDiv=document.createElement('div');ansDiv.className='answer-area';ansDiv.id='ans-area';
  area.appendChild(ansDiv);

  const chipDiv=document.createElement('div');chipDiv.className='chip-area';chipDiv.id='chip-area';
  chipWords.forEach((w,i)=>{
    const chip=document.createElement('span');
    chip.className='chip';chip.textContent=w;chip.dataset.idx=String(i);
    chip.addEventListener('click',()=>onChipClick(chip,i));
    chipDiv.appendChild(chip);
  });
  area.appendChild(chipDiv);

  const clearBtn=document.createElement('button');
  clearBtn.className='clear-btn';clearBtn.textContent='↩ 초기화';
  clearBtn.addEventListener('click',()=>{
    if(!answered)renderOrder(item);
  });
  area.appendChild(clearBtn);
}

function onChipClick(chip,idx){
  if(answered)return;
  chip.classList.add('used');
  answerChips.push({word:chip.textContent,idx});
  const ansArea=document.getElementById('ans-area');
  const ac=document.createElement('span');
  ac.className='answer-chip';ac.textContent=chip.textContent;
  ac.addEventListener('click',()=>{
    if(answered)return;
    answerChips=answerChips.filter(x=>x.idx!==idx);
    chip.classList.remove('used');
    ac.remove();
  });
  ansArea.appendChild(ac);
  if(answerChips.length===curItem.words.length)checkOrder();
}

function checkOrder(){
  if(answered)return;
  attempt++;
  const item=curItem;
  const userAns=answerChips.map(x=>x.word).join(' ');
  const correct=item.words.join(' ');
  if(norm(userAns)===norm(correct)){
    answered=true;
    speak('Great',1.1,1.3);
    addScore(attempt);okCount++;
    updateDots(attempt,true);
    setFb('✅ Correct! +'+Math.round(PER_Q*weight(attempt))+'점','ok');
    updateStats();showNav();
  }else{
    speak('Oh No',0.9,0.85);
    wrongCount++;
    mistakeLog.push({q:item.ko,user:userAns,correct:correct,try:attempt});
    updateDots(attempt,false);updateStats();
    if(attempt>=3){
      answered=true;
      setFb('❌ 정답: '+correct,'ng');showNav();
    }else{
      setFb(`❌ 틀렸어요! (${attempt}/3회) 다시 배열해보세요`,'ng');
      setTimeout(()=>renderOrder(item),700);
    }
  }
}

// ── Stage 3: Study ────────────────────────────────────
function renderStudy(item){
  document.getElementById('q-box').innerHTML=
    `<div style="font-size:.75rem;color:#7dd3fc;margin-bottom:6px">본문 이해 퀴즈</div>
     <div style="font-size:.95rem;font-weight:600;color:#e0e7ff;line-height:1.6">${item.q}</div>`;
  const area=document.getElementById('stage-area');
  area.innerHTML='';
  if(item.type==='mc'){
    const choices=shuffleChoices(item.choices,item.ans);
    const div=document.createElement('div');div.className='choices';
    choices.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';btn.textContent=c;
      btn.addEventListener('click',()=>onStudyMC(c,btn,item));
      div.appendChild(btn);
    });
    area.appendChild(div);
  }else{
    const wrap=document.createElement('div');wrap.className='input-wrap';
    const inp=document.createElement('input');
    inp.type='text';inp.placeholder='정답을 입력하세요...';
    const sub=document.createElement('button');
    sub.className='submit-btn';sub.textContent='확인';
    sub.addEventListener('click',()=>onStudySA(inp.value,item));
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')onStudySA(inp.value,item);});
    wrap.appendChild(inp);wrap.appendChild(sub);
    area.appendChild(wrap);
    setTimeout(()=>inp.focus(),100);
  }
}

function onStudyMC(choice,btn,item){
  if(answered)return;
  attempt++;
  const allBtns=document.querySelectorAll('.choice-btn');
  if(norm(choice)===norm(item.ans)){
    answered=true;
    btn.classList.add('correct');
    allBtns.forEach(b=>{if(b!==btn)b.classList.add('disabled');});
    speak('Great',1.1,1.3);
    addScore(attempt);okCount++;
    updateDots(attempt,true);
    setFb('✅ Correct! +'+Math.round(PER_Q*weight(attempt))+'점','ok');
    updateStats();showNav();
  }else{
    btn.classList.add('wrong');
    setTimeout(()=>btn.classList.remove('wrong'),400);
    speak('Oh No',0.9,0.85);
    wrongCount++;
    mistakeLog.push({q:item.q,user:choice,correct:item.ans,try:attempt});
    updateDots(attempt,false);updateStats();
    if(attempt>=3){
      answered=true;
      allBtns.forEach(b=>{
        b.classList.add('disabled');
        if(norm(b.textContent)===norm(item.ans))b.classList.add('correct');
      });
      setFb('❌ 정답: '+item.ans,'ng');showNav();
    }else{
      setFb(`❌ 틀렸어요! (${attempt}/3회)`,'ng');
    }
  }
}

function onStudySA(val,item){
  if(answered)return;
  attempt++;
  if(norm(val)===norm(item.ans)){
    answered=true;
    speak('Great',1.1,1.3);
    addScore(attempt);okCount++;
    updateDots(attempt,true);
    setFb('✅ Correct! +'+Math.round(PER_Q*weight(attempt))+'점','ok');
    updateStats();showNav();
  }else{
    speak('Oh No',0.9,0.85);
    wrongCount++;
    mistakeLog.push({q:item.q,user:val||'(없음)',correct:item.ans,try:attempt});
    updateDots(attempt,false);updateStats();
    const inp=document.querySelector('#stage-area input');
    if(inp){inp.value='';inp.focus();}
    if(attempt>=3){
      answered=true;
      setFb('❌ 정답: '+item.ans,'ng');showNav();
    }else{
      setFb(`❌ 틀렸어요! (${attempt}/3회) 다시 입력하세요`,'ng');
    }
  }
}

// ── 네비게이션 ────────────────────────────────────────
function nextQ(){
  cur++;
  if(cur>=STAGES[stage].length){
    if(stage<2){
      stageOffset+=STAGES[stage].length;
      stage++;cur=0;
      updateTabs();
    }else{showDone();return;}
  }
  attempt=0;answered=false;
  resetDots();setFb('','');
  document.getElementById('nav-btn').style.display='none';
  updateStats();renderCurrent();
}

function renderCurrent(){
  if(stage===0)renderSpelling(Q_DATA[cur]);
  else if(stage===1)renderOrder(K_DATA[cur]);
  else renderStudy(S_DATA[cur]);
}

// ── 완료 화면 ─────────────────────────────────────────
function showDone(){
  speak('Retire',1,1,'en-US');
  document.getElementById('main-card').style.display='none';
  const done=document.getElementById('done-card');done.style.display='block';
  const pct=Math.round(totalScore);
  const grade=pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
  const gcol={A:'#14532d',B:'#1e3a5f',C:'#78350f',D:'#7c2d12',F:'#450a0a'}[grade];
  const gc=document.getElementById('grade-circle');
  gc.style.background=gcol;gc.textContent=grade;
  document.getElementById('final-score').textContent=pct+'점';
  document.getElementById('final-detail').textContent=
    `정답 ${okCount} / 전체 ${TOTAL_Q} · 오답 ${wrongCount}회`;
  const ml=document.getElementById('mistake-list');ml.innerHTML='';
  if(mistakeLog.length===0){
    ml.innerHTML='<div style="text-align:center;color:#4ade80;padding:12px;font-size:.9rem">오답 없음 — 완벽해요! 🎉</div>';
  }else{
    const title=document.createElement('div');
    title.style.cssText='font-size:.8rem;color:#93c5fd;margin-bottom:8px;font-weight:600';
    title.textContent='📋 오답 리스트 ('+mistakeLog.length+'건)';
    ml.appendChild(title);
    mistakeLog.forEach((m,i)=>{
      const d=document.createElement('div');d.className='wrong-item';
      d.innerHTML=`<div class="wi-q">${i+1}. ${m.q}</div>
        <div class="wi-user">내 답: ${m.user}</div>
        <div class="wi-ans">정답: ${m.correct}</div>
        <div class="wi-try">${m.try}회차 오답</div>`;
      ml.appendChild(d);
    });
  }
}

// ── JPG 저장 ──────────────────────────────────────────
async function saveJPG(){
  const name=document.getElementById('stu-name').value.trim();
  if(!name){alert('학생 이름을 입력해 주세요.');return;}
  const now=new Date();
  const dateStr=now.getFullYear()+'.'+(now.getMonth()+1).toString().padStart(2,'0')+'.'+now.getDate().toString().padStart(2,'0');
  const pct=Math.round(totalScore);
  const grade=pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
  const gcol={A:'#14532d',B:'#1e3a5f',C:'#78350f',D:'#7c2d12',F:'#450a0a'}[grade];
  const wrongRows=mistakeLog.length===0
    ?'<tr><td colspan="3" style="text-align:center;color:#2e7d32;padding:10px">오답 없음 🎉</td></tr>'
    :mistakeLog.map((m,i)=>`<tr style="background:${i%2===0?'#f9f9f9':'#fff'}">
        <td style="padding:6px 8px;font-size:11px;color:#555">${m.q}</td>
        <td style="padding:6px 8px;font-size:11px;color:#c62828">${m.user}</td>
        <td style="padding:6px 8px;font-size:11px;color:#2e7d32;font-weight:600">${m.correct}</td>
      </tr>`).join('');
  const tmp=document.createElement('div');
  tmp.style.cssText='position:fixed;left:-9999px;top:0;background:#fff;padding:24px;width:480px;font-family:sans-serif';
  tmp.innerHTML=`
    <div style="font-size:11px;color:#aaa;margin-bottom:4px">Order Master · Can you? · ${dateStr} · Teacher: Michael Kim</div>
    <div style="font-size:22px;font-weight:700;color:#1B3A6B;margin-bottom:10px">${name}</div>
    <div style="width:70px;height:70px;border-radius:50%;background:${gcol};color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin:0 auto 10px">${grade}</div>
    <div style="text-align:center;font-size:28px;font-weight:700;color:#1B3A6B;margin-bottom:4px">${pct}점</div>
    <div style="text-align:center;font-size:12px;color:#888;margin-bottom:16px">정답 ${okCount} / 전체 ${TOTAL_Q}</div>
    <div style="background:#7C3AED;color:#fff;padding:8px 12px;font-size:12px;border-radius:6px 6px 0 0;font-weight:600">오답 리스트 (${mistakeLog.length}건)</div>
    <table style="width:100%;border-collapse:collapse;border:1px solid #eee;border-top:none">
      <thead><tr style="background:#f5f5f5">
        <th style="padding:6px 8px;font-size:11px;color:#888;font-weight:400;text-align:left">문제</th>
        <th style="padding:6px 8px;font-size:11px;color:#888;font-weight:400;text-align:left">내 답</th>
        <th style="padding:6px 8px;font-size:11px;color:#888;font-weight:400;text-align:left">정답</th>
      </tr></thead>
      <tbody>${wrongRows}</tbody>
    </table>`;
  document.body.appendChild(tmp);
  try{
    const canvas=await html2canvas(tmp,{backgroundColor:'#fff',scale:2,useCORS:true,logging:false});
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/jpeg',0.95);
    a.download=name+'_can_you.jpg';a.click();
  }catch(e){alert('저장 오류: '+e.message);}
  document.body.removeChild(tmp);
}

// ── 이벤트 바인딩 ─────────────────────────────────────
document.getElementById('nav-btn').addEventListener('click',nextQ);
document.getElementById('save-jpg-btn').addEventListener('click',saveJPG);
document.getElementById('restart-btn').addEventListener('click',()=>location.reload());

// ── 시작 ─────────────────────────────────────────────
updateStats();
renderCurrent();
</script>
</body>
